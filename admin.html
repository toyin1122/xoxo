<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XOXOChic Admin - Orders</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #fff0f5; }
    h1 { color: #ff69b4; margin-bottom: 20px; }
    .order { border: 2px solid #ffb6c1; padding: 15px; margin-bottom: 20px; border-radius: 8px; background: #fff0f5; }
    h3 { margin-bottom: 5px; color: #ff1493; }
    ul { list-style: none; padding-left: 0; }
    li { margin-bottom: 3px; }
    .paid { color: green; font-weight: bold; }
    .unpaid { color: red; font-weight: bold; }
    button { padding: 5px 10px; margin-top: 5px; cursor: pointer; background: #ff69b4; color: white; border: none; border-radius: 4px; }
    button:hover { background: #ff1493; }
    #locked-message { color: red; font-weight: bold; }
  </style>
</head>
<body>
  <h1>💖 XOXOChic Admin Orders</h1>
  <div id="orders-list"></div>

  <script>
    // =============================
    // 🔒 Simple Password Protection
    // =============================
    const ADMIN_PASSWORD = 'xoxochic123'; // Change this to your preferred password
    let attempts = 0;
    const maxAttempts = 3;

    function askPassword() {
      const password = prompt("Enter admin password:");
      if (password === ADMIN_PASSWORD) {
        initAdmin();
      } else {
        attempts++;
        if (attempts < maxAttempts) {
          alert(`Wrong password 💔. You have ${maxAttempts - attempts} attempts left.`);
          askPassword();
        } else {
          document.body.innerHTML = '<p id="locked-message">Access denied 😢</p>';
        }
      }
    }

    // =============================
    // 💖 Admin Page Functionality
    // =============================
    function initAdmin() {
      const ordersDiv = document.getElementById('orders-list');
      let orders = JSON.parse(localStorage.getItem('orders')) || [];

      function renderOrders() {
        ordersDiv.innerHTML = '';
        if (orders.length === 0) {
          ordersDiv.innerHTML = '<p>No orders yet 💔</p>';
          return;
        }

        orders.forEach((order, index) => {
          const orderDiv = document.createElement('div');
          orderDiv.classList.add('order');
          orderDiv.innerHTML = `
            <h3>Order #${order.id}</h3>
            <p><strong>Name:</strong> ${order.name}</p>
            <p><strong>Email:</strong> ${order.email}</p>
            <p><strong>Address:</strong> ${order.address}</p>
            <p><strong>Total:</strong> ₦${order.total.toLocaleString()}</p>
            <p><strong>Status:</strong> <span class="${order.paid ? 'paid' : 'unpaid'}">${order.paid ? 'Paid 💖' : 'Unpaid 💔'}</span></p>
            <p><strong>Items:</strong></p>
            <ul>
              ${order.items.map(i => `<li>${i.name} x ${i.quantity} - ₦${(i.price * i.quantity).toLocaleString()}</li>`).join('')}
            </ul>
            <button onclick="markAsPaid(${index})">Mark as Paid ✅</button>
            <button onclick="deleteOrder(${index})" style="background:red;">Delete ❌</button>
          `;
          ordersDiv.appendChild(orderDiv);
        });
      }

      // Mark order as paid
      window.markAsPaid = function(index) {
        orders[index].paid = true;
        localStorage.setItem('orders', JSON.stringify(orders));
        renderOrders();
      }

      // Delete order
      window.deleteOrder = function(index) {
        if (confirm('Are you sure you want to delete this order?')) {
          orders.splice(index, 1);
          localStorage.setItem('orders', JSON.stringify(orders));
          renderOrders();
        }
      }

      renderOrders();
    }

    // Ask password on page load
    document.addEventListener('DOMContentLoaded', askPassword);
  </script>
</body>
</html>
